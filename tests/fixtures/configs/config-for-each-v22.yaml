# Config with a multi-version runtime (dummy-rt-multi, versions: ["22"]).
# Verifies: shrinking the array removes the dropped resource from state.
# Used by: for_each_shrink scenario (second apply).

profile:
  components:
    local:
      dummy-rt-multi:
        params:
          versions:
            - "22"

strategy:
  rules:
    - match:
        kind: package
      use: local/dummy-pkg
    - match:
        kind: runtime
      use: local/dummy-rt
  fs:
    backup: false
