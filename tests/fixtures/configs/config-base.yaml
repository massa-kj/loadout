# Minimal feature set: package + fs resources, no runtime.
# Verifies state creation, file tracking, and no duplicates.
# Used by: minimal, lifecycle (base phase), idempotent, uninstall scenarios.

profile:
  components:
    local:
      dummy-pkg: {}
      dummy-fs: {}

strategy:
  package:
    default_backend: local/dummy-pkg
  runtime:
    default_backend: local/dummy-rt
  fs:
    # Disable backups inside test containers — no need to preserve originals.
    backup: false
