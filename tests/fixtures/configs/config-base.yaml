# Minimal component set: package + fs resources, no runtime.
# Verifies state creation, file tracking, and no duplicates.
# Used by: minimal, lifecycle (base phase), idempotent, uninstall scenarios.

profile:
  components:
    local:
      dummy-pkg: {}
      dummy-fs-copy: {}
      dummy-fs-link: {}

strategy:
  rules:
    - match:
        kind: package
      use: local/dummy-pkg
    - match:
        kind: runtime
      use: local/dummy-rt
  fs:
    # Disable backups inside test containers — no need to preserve originals.
    backup: false
