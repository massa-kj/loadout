# Managed-script tool component: dummy-tool marker.
# Verifies managed_script create/idempotent/destroy flow.
# Used by: managed-script scenario.

profile:
  components:
    local:
      dummy-tool: {}

strategy:
  rules:
    - match:
        kind: package
      use: local/dummy-pkg
    - match:
        kind: runtime
      use: local/dummy-rt
  fs:
    backup: false
