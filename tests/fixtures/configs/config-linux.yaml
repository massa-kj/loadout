profile:
  features:
    local:
      brew: {}
      # cli-tools: {}
      fzf: {}
      mise: {}
      # ripgrep: {}

      node:
        version: "22.17.1"
      npm: {}
      # python:
      #   version: "3.12"
      # uv: {}
      # rust:
      #   version: "1.87"

strategy:
  package:
    # Default backend for system package installs on Linux / WSL.
    default_backend: local/brew
    # Per-resource backend overrides, keyed by the exact package name.
    overrides:
      typescript:
        backend: local/npm
      typescript-language-server:
        backend: local/npm
      eslint:
        backend: local/npm
      python-lsp-server:
        backend: local/uv

  runtime:
    # Default backend for runtime installs (node, python, rust, lua, etc.).
    default_backend: local/mise
    # Per-resource backend overrides, keyed by the runtime name
    # (e.g. "node", "python") — not the feature name.
    # Example:
    #   overrides:
    #     node:
    #       backend: mise
    overrides: {}

  fs:
    # Create a backup of existing files before overwriting.
    backup: true
    backup_dir: "~/.loadout_backup"
