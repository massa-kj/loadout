# Config with a multi-version runtime (dummy-rt-multi, versions: ["18", "22"]).
# Verifies: for_each expands to two runtime resources in state.
# Used by: for_each_expand scenario, for_each_shrink scenario (first apply).

profile:
  components:
    local:
      dummy-rt-multi:
        params:
          versions:
            - "18"
            - "22"

strategy:
  rules:
    - match:
        kind: package
      use: local/dummy-pkg
    - match:
        kind: runtime
      use: local/dummy-rt
  fs:
    backup: false
