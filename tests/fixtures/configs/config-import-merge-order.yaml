# import-merge-order scenario: later import overrides earlier at bundle-name level.
#
# import-bundle-base.yaml:  bundles.base → local/dummy-pkg
# import-bundle-extra.yaml: bundles.base → local/dummy-fs-copy  (overrides base)
#
# Expected result: bundle.use: [base] → installs local/dummy-fs-copy, NOT local/dummy-pkg.
# profile.components then adds local/dummy-fs-link on top.
#
# Verifies:
#   - Multiple imports are processed left-to-right (last wins at bundle-name level).
#   - profile.components takes priority over all imported bundle definitions.
#
# Used by: import_merge_order scenario.

imports:
  - import-bundle-base.yaml
  - import-bundle-extra.yaml

bundle:
  use:
    - base

profile:
  components:
    local:
      dummy-fs-link: {}

strategy:
  package:
    default_backend: local/dummy-pkg
  runtime:
    default_backend: local/dummy-rt
  fs:
    backup: false
