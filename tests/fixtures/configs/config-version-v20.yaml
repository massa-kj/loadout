# Config with a versioned runtime (dummy-rt@20).
# Verifies: version is recorded in state.
# Used by: version_install scenario, version_upgrade scenario (first apply).

profile:
  features:
    local:
      dummy-rt:
        version: "20"

strategy:
  package:
    default_backend: local/dummy-pkg
  runtime:
    default_backend: local/dummy-rt
  fs:
    backup: false
