# Config with a versioned runtime (node@20).
# Verifies: version is recorded in state.
# Used by: version_install scenario, version_upgrade scenario (first apply)

profile:
  features:
    local/brew: {}
    local/mise: {}
    local/node:
      version: "20"

strategy:
  package:
    default_backend: local/brew
  runtime:
    default_backend: local/mise
  fs:
    backup: false
