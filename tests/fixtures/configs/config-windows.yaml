profile:
  components:
    local:
      caps2ctrl: {}
      cli-tools: {}
      git: {}
      git-tools: {}
      mise: {}
      neovim: {}
      powershell: {}
      scoop: {}
      vcredist: {}
      vscode: {}

      lua: {}
      node:
        params:
          version: "22.17.1"
      npm: {}
      python: {}
      uv: {}
      rust: {}


strategy:
  package:
    # Default backend for system package installs on Windows.
    default_backend: local/scoop
    # Per-resource backend overrides, keyed by the exact package name.
    overrides:
      typescript:
        backend: local/npm
      typescript-language-server:
        backend: local/npm
      eslint:
        backend: local/npm
      python-lsp-server:
        backend: local/uv

  runtime:
    # Default backend for runtime installs (node, python, rust, lua, etc.).
    default_backend: local/mise
    # Per-resource backend overrides, keyed by the runtime name
    # (e.g. "node", "python") — not the component name.
    # Example:
    #   overrides:
    #     node:
    #       backend: mise
    overrides: {}

  fs:
    # Create a backup of existing files before overwriting.
    backup: true
    backup_dir: "~/.loadout_backup"
