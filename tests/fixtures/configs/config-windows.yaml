profile:
  features:
    local/caps2ctrl: {}
    local/cli-tools: {}
    local/git: {}
    local/git-tools: {}
    local/mise: {}
    local/neovim: {}
    local/powershell: {}
    local/scoop: {}
    local/vcredist: {}
    local/vscode: {}

    local/lua: {}
    local/node:
      version: "22.17.1"
    local/npm: {}
    local/python:
      version: "3.12"
    local/uv: {}
    local/rust:
      version: "1.87"


strategy:
  package:
    # Default backend for system package installs on Windows.
    default_backend: local/scoop
    # Per-resource backend overrides, keyed by the exact package name.
    overrides:
      typescript:
        backend: local/npm
      typescript-language-server:
        backend: local/npm
      eslint:
        backend: local/npm
      python-lsp-server:
        backend: local/uv

  runtime:
    # Default backend for runtime installs (node, python, rust, lua, etc.).
    default_backend: local/mise
    # Per-resource backend overrides, keyed by the runtime name
    # (e.g. "node", "python") — not the feature name.
    # Example:
    #   overrides:
    #     node:
    #       backend: mise
    overrides: {}

  fs:
    # Create a backup of existing files before overwriting.
    backup: true
    backup_dir: "~/.loadout_backup"
