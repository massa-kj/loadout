# import-single scenario: bundle is defined in an imported file.
#
# Verifies:
#   - importedfile's bundles: section is available to bundle.use in the main file.
#   - Components declared via bundle are installed and recorded in state.
#   - profile.components (local/dummy-fs-copy) is merged on top of the bundle.
#
# Used by: import_single scenario.

imports:
  - import-bundle-base.yaml

bundle:
  use:
    - base

profile:
  components:
    local:
      dummy-fs-copy: {}

strategy:
  rules:
    - match:
        kind: package
      use: local/dummy-pkg
    - match:
        kind: runtime
      use: local/dummy-rt
  fs:
    backup: false
