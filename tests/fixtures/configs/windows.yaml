profile:
  components:
    local:
      caps2ctrl: {}
      cli-tools: {}
      git: {}
      git-tools: {}
      mise: {}
      neovim: {}
      powershell: {}
      scoop: {}
      vcredist: {}
      vscode: {}

      lua: {}
      node:
        params:
          version: "22.17.1"
      npm: {}
      python: {}
      uv: {}
      rust: {}


strategy:
  rules:
    # Default backend for all package installs on Windows.
    - match:
        kind: package
      use: local/scoop
    # Per-name package overrides.
    - match:
        kind: package
        name: typescript
      use: local/npm
    - match:
        kind: package
        name: typescript-language-server
      use: local/npm
    - match:
        kind: package
        name: eslint
      use: local/npm
    - match:
        kind: package
        name: python-lsp-server
      use: local/uv
    # Default backend for all runtime installs (node, python, rust, lua, etc.).
    - match:
        kind: runtime
      use: local/mise

  fs:
    # Create a backup of existing files before overwriting.
    backup: true
    backup_dir: "~/.loadout_backup"
