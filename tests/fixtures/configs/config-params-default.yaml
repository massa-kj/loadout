# Config with dummy-rt but no params override.
# Verifies: when profile omits params, the schema default value ("1.0") is used.
# Used by: params_default scenario.

profile:
  components:
    local:
      dummy-rt: {}

strategy:
  package:
    default_backend: local/dummy-pkg
  runtime:
    default_backend: local/dummy-rt
  fs:
    backup: false
