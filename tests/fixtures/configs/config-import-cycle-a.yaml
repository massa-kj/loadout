# Cycle detection fixture — part A.
# Imports config-import-cycle-b.yaml, which in turn imports this file → cycle.
# Used by: import_cycle scenario (expected to fail with a non-zero exit).

imports:
  - config-import-cycle-b.yaml

profile:
  components:
    local:
      dummy-pkg: {}

strategy:
  rules:
    - match:
        kind: package
      use: local/dummy-pkg
