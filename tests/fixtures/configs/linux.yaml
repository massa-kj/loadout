profile:
  components:
    local:
      bash: {}
      brew: {}
      # cli-tools: {}
      fzf: {}
      mise: {}
      # ripgrep: {}

      node:
        params:
          version: "22.17.1"
      npm: {}
      # python:
      #   version: "3.12"
      # uv: {}
      # rust:
      #   version: "1.87"

strategy:
  groups:
    npm-global:
      package:
        - typescript
        - typescript-language-server
        - eslint
      
  rules:
    # Default backend for all package installs on Linux.
    - match:
        kind: package
      use: local/brew
    # Per-name package overrides.
    # - match:
    #     kind: package
    #     name: typescript
    #   use: local/npm
    # - match:
    #     kind: package
    #     name: typescript-language-server
    #   use: local/npm
    # - match:
    #     kind: package
    #     name: eslint
    #   use: local/npm
    - match:
        kind: package
        group: npm-global
      use: local/npm
    - match:
        kind: package
        name: python-lsp-server
      use: local/uv
    # Default backend for all runtime installs (node, python, rust, lua, etc.).
    - match:
        kind: runtime
      use: local/mise

  fs:
    # Create a backup of existing files before overwriting.
    backup: true
    backup_dir: "~/.loadout_backup"
