# Broader component set: package + fs + runtime resources.
# Verifies that runtime version is recorded and components expand correctly.
# Used by: lifecycle (expand phase), idempotent (full profile variant).

profile:
  components:
    local:
      dummy-pkg: {}
      dummy-fs-copy: {}
      dummy-fs-link: {}
      dummy-rt: {}

strategy:
  rules:
    - match:
        kind: package
      use: local/dummy-pkg
    - match:
        kind: runtime
      use: local/dummy-rt
  fs:
    backup: false
