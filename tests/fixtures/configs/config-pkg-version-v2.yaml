# Config with a versioned package (dummy-pkg-versioned@2.0).
# Verifies: version change triggers Replace; state is updated.
# Used by: pkg_version_upgrade scenario (second apply).

profile:
  components:
    local:
      dummy-pkg-versioned:
        params:
          version: "2.0"

strategy:
  rules:
    - match:
        kind: package
      use: local/dummy-pkg
    - match:
        kind: runtime
      use: local/dummy-rt
  fs:
    backup: false
