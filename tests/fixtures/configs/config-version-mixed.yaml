# Mixed config: versioned (dummy-rt) and non-versioned (dummy-pkg) components.
# Verifies: versioned components record runtime.version; non-versioned do not.
# Used by: version_mixed scenario.

profile:
  components:
    local:
      dummy-pkg: {}
      dummy-rt:
        params:
          version: "20"

strategy:
  rules:
    - match:
        kind: package
      use: local/dummy-pkg
    - match:
        kind: runtime
      use: local/dummy-rt
  fs:
    backup: false
