# Mixed config: versioned (node) and non-versioned features together.
# Verifies: versioned features record runtime.version; non-versioned do not.
# Used by: version_mixed scenario

profile:
  features:
    brew: {}
    mise: {}
    node:
      version: "20"

strategy:
  package:
    default_backend: core/brew
  runtime:
    default_backend: core/mise
  fs:
    backup: false
