# Config with version bumped to node@22.
# Verifies: version mismatch triggers reinstall, state updated.
# Used by: version_upgrade scenario (second apply)

profile:
  features:
    local:
      brew: {}
      mise: {}
      node:
        version: "22"

strategy:
  package:
    default_backend: local/brew
  runtime:
    default_backend: local/mise
  fs:
    backup: false
