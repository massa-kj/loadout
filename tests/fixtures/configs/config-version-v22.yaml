# Config with version bumped (dummy-rt@22).
# Verifies: version mismatch triggers reinstall, state updated.
# Used by: version_upgrade scenario (second apply).

profile:
  components:
    local:
      dummy-rt:
        params:
          version: "22"

strategy:
  package:
    default_backend: local/dummy-pkg
  runtime:
    default_backend: local/dummy-rt
  fs:
    backup: false
