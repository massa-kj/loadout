# Config with a versioned package (dummy-pkg-versioned@1.0).
# Verifies: package version is recorded in state after install.
# Used by: pkg_version_install scenario, pkg_version_upgrade scenario (first apply).

profile:
  components:
    local:
      dummy-pkg-versioned:
        params:
          version: "1.0"

strategy:
  rules:
    - match:
        kind: package
      use: local/dummy-pkg
    - match:
        kind: runtime
      use: local/dummy-rt
  fs:
    backup: false
