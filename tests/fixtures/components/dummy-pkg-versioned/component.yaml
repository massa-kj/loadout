spec_version: 1
description: |
  Dummy versioned package component for E2E testing.
  Uses the local/dummy-pkg backend — no network access required.
  Accepts a required `version` param to test Package version recording.
depends: []

params_schema:
  properties:
    version:
      type: string
  required:
    - version

resources:
  - kind: package
    id: pkg:dummy-versioned
    name: dummy-versioned
    version: "${params.version}"
