spec_version: 1
description: |
  Dummy multi-version runtime component for for_each E2E testing.
  Uses the local/dummy-rt backend — no network access required.
  Accepts a required `versions` array param and expands into one runtime resource per element.
depends: []

provides:
  - name: runtime_manager

params_schema:
  properties:
    versions:
      type: array
      items:
        type: string
  required:
    - versions

resources:
  - kind: runtime
    id: "rt:dummy-rt@${item}"
    name: dummy-rt
    version: "${item}"
    for_each: "params.versions"
