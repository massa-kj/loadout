spec_version: 1
description: |
  Dummy filesystem component for E2E testing.
  Creates a marker file under ~/.config/loadout/dummy-fs-marker.
  Verifies fs resource tracking and safe removal without backend involvement.
depends: []

resources:
  - kind: fs
    id: fs:dummy-fs-marker
    source: files/marker
    path: ~/.config/loadout/dummy-fs-marker
    entry_type: file
    op: copy
