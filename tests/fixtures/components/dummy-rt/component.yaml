spec_version: 1
description: |
  Dummy runtime component for E2E testing.
  Uses the local/dummy-rt backend — no network access required.
  When no version is specified in profile params, the default version "1.0" is used.
  Override via: params: { version: "<desired>" } in the profile component config.
depends: []

provides:
  - name: runtime_manager

params_schema:
  properties:
    version:
      type: string
      default: "1.0"

resources:
  - kind: runtime
    id: rt:dummy-rt
    name: dummy-rt
    version: "${params.version}"
