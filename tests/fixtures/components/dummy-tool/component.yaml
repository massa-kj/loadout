spec_version: 1
mode: managed_script
description: |
  Dummy managed_script component for E2E testing.
  Creates a marker file to simulate tool installation without network access.
  Used by: managed-script scenario.

scripts:
  install: install.sh
  uninstall: uninstall.sh

resources:
  - kind: tool
    id: tool:dummy-tool-marker
    name: dummy-tool
    verify:
      identity:
        type: file
        path: /tmp/loadout-dummy/tools/dummy-tool
        executable: false
