name: Dev Release

# Triggered on every push to main.
# Deletes and recreates the "dev" pre-release so assets are always up-to-date,
# while release assets never accumulate.

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          channel: 1.95.0
          # targets: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Show installed targets
        run: rustup target list --installed

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          ASSET="loadout-dev-${TARGET}"

          mkdir -p "${ASSET}"
          cp "target/${TARGET}/release/loadout" "${ASSET}/"
          chmod +x "${ASSET}/loadout"

          tar -czf "${ASSET}.tar.gz" "${ASSET}"
          echo "ASSET_PATH=${ASSET}.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${ASSET}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Target = "${{ matrix.target }}"
          $Asset  = "loadout-dev-${Target}"

          New-Item -ItemType Directory -Path "${Asset}" | Out-Null
          Copy-Item "target/${Target}/release/loadout.exe" "${Asset}/"

          Compress-Archive -Path "${Asset}" -DestinationPath "${Asset}.zip"
          "ASSET_PATH=${Asset}.zip" | Out-File -Append $env:GITHUB_ENV
          "ASSET_NAME=${Asset}.zip" | Out-File -Append $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_PATH }}
          retention-days: 1

  release:
    name: Overwrite dev release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Delete existing dev release + tag so assets don't accumulate.
      # `|| true` makes this a no-op on first run when the release doesn't exist yet.
      - name: Delete existing dev release
        run: gh release delete dev --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "dev (latest main)"
          prerelease: true
          body: |
            Automated build from the latest commit on `main`.

            **This is a pre-release for testing only.**
            Use a tagged release for production.

            Commit: ${{ github.sha }}
          files: artifacts/*
