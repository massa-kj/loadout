name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          channel: 1.95.0
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          ASSET="loadout-${VERSION}-${TARGET}"

          mkdir -p "${ASSET}/bin" "${ASSET}/cmd"
          cp "target/${TARGET}/release/loadout" "${ASSET}/bin/"
          cp cmd/*.sh cmd/*.ps1 "${ASSET}/cmd/"
          chmod +x "${ASSET}/bin/loadout" "${ASSET}/cmd/"*.sh

          tar -czf "${ASSET}.tar.gz" "${ASSET}"
          echo "ASSET_PATH=${ASSET}.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${ASSET}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME
          $Target  = "${{ matrix.target }}"
          $Asset   = "loadout-${Version}-${Target}"

          New-Item -ItemType Directory -Path "${Asset}/bin", "${Asset}/cmd" | Out-Null
          Copy-Item "target/${Target}/release/loadout.exe" "${Asset}/bin/"
          Copy-Item cmd/*.sh, cmd/*.ps1 "${Asset}/cmd/"

          Compress-Archive -Path "${Asset}" -DestinationPath "${Asset}.zip"
          "ASSET_PATH=${Asset}.zip"  | Out-File -Append $env:GITHUB_ENV
          "ASSET_NAME=${Asset}.zip"  | Out-File -Append $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_PATH }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
